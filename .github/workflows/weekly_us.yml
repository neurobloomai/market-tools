name: Weekly Screener — US

on:
  schedule:
    - cron: '0 13 * * 1'  # Monday 1pm UTC = 8am EST
  workflow_dispatch:

jobs:
  run-us-screeners:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance anthropic

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Dashboard
        run: python dashboard.py --refresh

      - name: Sync after dashboard
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: Weekly snapshot
        run: python weekly_snapshot.py

      - name: Sync after snapshot
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: Quality screener
        run: python screener.py

      - name: Sync after screener
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: Aligned screener
        run: python aligned_screener.py

      - name: Sync after aligned screener
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: Market breadth
        run: python market_breadth.py

      - name: Commit breadth snapshots
        run: |
          git add breadth_snapshot.json india_breadth_snapshot.json || true
          git diff --cached --quiet || git commit -m "breadth_snapshot: $(date -u +'%b %d %Y')"
          git push || true

      - name: Sync after breadth
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: Newsletter draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_TO: amarnath@neurobloom.ai
        run: python newsletter_draft.py

      - name: Commit newsletter draft
        run: |
          git add newsletter_draft.md || true
          git diff --cached --quiet || git commit -m "newsletter_draft: $(date -u +'%b %d %Y')"
          git push || true
