name: Weekly Screener — US + India

on:
  schedule:
    - cron: '30 2 * * 1'  # Monday 2:30am UTC = 8am IST = Sunday 9:30pm EST (both markets closed, clean Friday close)
  workflow_dispatch:

jobs:
  run-screeners:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance anthropic

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── US ────────────────────────────────────────────────────────────────────

      - name: US Dashboard
        run: python dashboard.py --refresh

      - name: Sync after US dashboard
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: US Weekly snapshot
        run: python weekly_snapshot.py

      - name: US Market breadth
        run: python market_breadth.py

      - name: Commit US snapshots
        run: |
          git add breadth_snapshot.json setups_snapshot.json watchlist_snapshot.json || true
          git diff --cached --quiet || git commit -m "us_snapshots: $(date -u +'%b %d %Y')"
          git push || true

      - name: Sync after US breadth
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: US Quality screener
        run: python screener.py

      - name: Sync after US screener
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: US Aligned screener
        run: python aligned_screener.py

      - name: Sync after US aligned screener
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      # ── India ─────────────────────────────────────────────────────────────────

      - name: India Dashboard
        run: python india_dashboard.py --refresh

      - name: Sync after India dashboard
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: India Weekly snapshot
        run: python india_weekly_snapshot.py

      - name: Sync after India snapshot
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: India Quality screener
        run: python india_screener.py

      - name: Sync after India screener
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: India Aligned screener
        run: python india_aligned_screener.py

      - name: Sync after India aligned screener
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: India Market breadth
        run: python india_marketbreadth.py

      - name: Commit India snapshots
        run: |
          git add india_breadth_snapshot.json || true
          git diff --cached --quiet || git commit -m "india_snapshots: $(date -u +'%b %d %Y')"
          git push || true

      - name: Sync after India breadth
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      # ── Alerts + Newsletter ───────────────────────────────────────────────────

      - name: Alert check
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBSCRIBERS: ${{ secrets.SUBSCRIBERS }}
        run: python alert_check.py

      - name: Commit alert state
        run: |
          git add alert_state.json || true
          git diff --cached --quiet || git commit -m "alert_state: $(date -u +'%b %d %Y')"
          git push || true

      - name: Newsletter draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBSCRIBERS: ${{ secrets.SUBSCRIBERS }}
        run: python newsletter_draft.py

      - name: Commit newsletter draft
        run: |
          git add newsletter_draft.md || true
          git diff --cached --quiet || git commit -m "newsletter_draft: $(date -u +'%b %d %Y')"
          git push || true
