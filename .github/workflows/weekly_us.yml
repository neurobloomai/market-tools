name: Weekly Screener — US

on:
  schedule:
    - cron: '0 13 * * 1'  # Monday 1pm UTC = 8am EST
  workflow_dispatch:

jobs:
  run-us-screeners:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Dashboard
        run: python dashboard.py --refresh

      - name: Weekly snapshot
        run: python weekly_snapshot.py

      - name: Quality screener
        run: python screener.py

      - name: Aligned screener
        run: python aligned_screener.py
