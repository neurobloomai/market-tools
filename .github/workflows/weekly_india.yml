name: Weekly Screener — India

on:
  schedule:
    - cron: '30 2 * * 1'  # Monday 2:30am UTC = 8am IST
  workflow_dispatch:

jobs:
  run-india-screeners:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Dashboard
        run: python india_dashboard.py --refresh

      - name: Sync after dashboard
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: Weekly snapshot
        run: python india_weekly_snapshot.py

      - name: Sync after snapshot
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: Quality screener
        run: python india_screener.py

      - name: Sync after screener
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: Aligned screener
        run: python india_aligned_screener.py

      - name: Sync after aligned screener
        run: |
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true

      - name: Market breadth
        run: python india_marketbreadth.py
