name: Weekly Screener — India

on:
  schedule:
    - cron: '30 2 * * 1'  # Monday 2:30am UTC = 8am IST
  workflow_dispatch:

jobs:
  run-india-screeners:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Dashboard
        run: python india_dashboard.py --refresh

      - name: Weekly snapshot
        run: python india_weekly_snapshot.py

      - name: Quality screener
        run: python india_screener.py

      - name: Aligned screener
        run: python india_aligned_screener.py
